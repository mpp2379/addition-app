<!DOCTYPE html>
<html>
<head>
<title>Addition App</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
<h2>Addition Calculator</h2>
<form method="POST">
<input type="number" step="any" name="num1" placeholder="Number 1" required><br><br>
<input type="number" step="any" name="num2" placeholder="Number 2" required><br><br>
<button type="submit">Add Numbers</button>
</form>
{% if result is not none %}
<h3>Result: {{ result }}</h3>
{% endif %}
</div>
</body>
</html>
